<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Library - HON-ACADEMY</title>
<meta name="description" content="Browse and download textbooks, study guides, past papers, and digital learning materials." />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="animate-fade-in">
<header class="site-header"></header>

<section class="page-banner">
  <div class="container">
    <div class="breadcrumb-custom"><a href="index.html">Home</a><span>/</span><span class="current">Digital Library</span></div>
    <h1>Digital Library</h1>
    <p id="page-intro">Browse and download textbooks, study guides, past papers, and digital learning materials.</p>
  </div>
</section>

<main class="container my-5">

  <!-- Filter Bar -->
  <div class="row g-3 mb-4 align-items-center">
    <div class="col-md-4">
      <select class="form-select rounded-pill" id="filter-subject">
        <option value="all">All Subjects</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select rounded-pill" id="filter-type">
        <option value="all">All File Types</option>
        <option value="pdf">PDF</option>
        <option value="pptx">PowerPoint</option>
        <option value="docx">Word Document</option>
        <option value="video">Video</option>
      </select>
    </div>
    <div class="col-md-5">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 rounded-start-pill"><i class="fa-solid fa-search text-muted"></i></span>
        <input type="text" class="form-control border-start-0 rounded-end-pill" id="filter-search" placeholder="Search by title...">
      </div>
    </div>
  </div>

  <!-- Upload Button (Teacher/Admin) -->
  <div class="mb-4 d-none" id="upload-section">
    <button class="btn btn-nca-green rounded-pill px-4" onclick="showUploadModal()">
      <i class="fa-solid fa-cloud-arrow-up me-2"></i>Upload New Resource
    </button>
  </div>

  <!-- Books Grid -->
  <div class="row g-4" id="books-grid"></div>

  <div class="text-center py-5 d-none" id="no-books-msg">
    <i class="fa-solid fa-folder-open text-muted mb-3" style="font-size:3rem"></i>
    <p class="text-muted">No resources match your filters.</p>
  </div>

</main>

<footer class="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const school = window.db.getSchoolInfo();
  document.title = 'Digital Library - ' + school.name;
  document.getElementById('page-intro').textContent = school.booksIntro || 'Browse and download textbooks, study guides, past papers, and digital learning materials.';
  const user = window.db.getCurrentUser();
  const books = window.db.getAllBooks();
  const subjects = window.db.getSubjects();

  if (user && (user.role === "teacher" || user.role === "admin")) {
    document.getElementById("upload-section").classList.remove("d-none");
  }

  const subjectSelect = document.getElementById("filter-subject");
  subjects.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.title + ' (' + s.level + ')';
    subjectSelect.appendChild(opt);
  });

  function renderBooks() {
    const subjectFilter = subjectSelect.value;
    const typeFilter = document.getElementById("filter-type").value;
    const searchTerm = document.getElementById("filter-search").value.toLowerCase();

    let filtered = books;
    if (subjectFilter !== "all") filtered = filtered.filter(b => b.subjectId === parseInt(subjectFilter));
    if (typeFilter !== "all") filtered = filtered.filter(b => b.fileType === typeFilter);
    if (searchTerm) filtered = filtered.filter(b => b.title.toLowerCase().includes(searchTerm));

    const grid = document.getElementById("books-grid");
    const noMsg = document.getElementById("no-books-msg");

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center py-5"><i class="fa-solid fa-book-open text-muted mb-3" style="font-size:3rem"></i><p class="text-muted">No resources available yet. Check back soon!</p></div>';
      noMsg.classList.add("d-none");
      return;
    }
    noMsg.classList.add("d-none");

    const fileIcons = { pdf:"fa-file-pdf text-danger", pptx:"fa-file-powerpoint text-warning", docx:"fa-file-word text-primary", video:"fa-file-video text-info" };
    const fileBgColors = { pdf:"bg-danger bg-opacity-10", pptx:"bg-warning bg-opacity-10", docx:"bg-primary bg-opacity-10", video:"bg-info bg-opacity-10" };

    grid.innerHTML = filtered.map(b => {
      const icon = fileIcons[b.fileType] || "fa-file text-secondary";
      const bg = fileBgColors[b.fileType] || "bg-light";
      const subj = subjects.find(s => s.id === b.subjectId);
      const date = new Date(b.uploadedAt).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
      return '<div class="col-sm-6 col-lg-4 col-xl-3"><div class="card border-0 bg-white h-100 shadow-sm"><div class="card-body p-4 d-flex flex-column"><div class="'+bg+' rounded-3 d-flex align-items-center justify-content-center mb-3" style="height:80px"><i class="fa-solid '+icon+'" style="font-size:2.5rem"></i></div><span class="badge bg-light text-dark border text-uppercase mb-2" style="font-size:9px;width:fit-content">'+b.fileType+'</span><h6 class="font-bold text-dark mb-2">'+b.title+'</h6><p class="small text-muted mb-1"><i class="fa-solid fa-book me-1"></i> '+(subj?subj.title:'General')+'</p><p class="small text-muted mb-3"><i class="fa-solid fa-user me-1"></i> '+(b.uploadedByName||'Teacher')+' &middot; '+date+'</p><button class="btn btn-outline-primary btn-sm rounded-pill mt-auto" onclick="window.showToast(\'Downloading: '+b.title+'\',\'success\')"><i class="fa-solid fa-download me-1"></i> Download</button></div></div></div>';
    }).join("");
  }

  subjectSelect.addEventListener("change", renderBooks);
  document.getElementById("filter-type").addEventListener("change", renderBooks);
  document.getElementById("filter-search").addEventListener("input", renderBooks);
  renderBooks();
});

function showUploadModal() {
  window.showToast("Upload modal coming soon!", "warning");
}
</script>
</body>
</html>
