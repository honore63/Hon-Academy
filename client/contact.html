<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - HON-ACADEMY</title>
<meta name="description" content="Get in touch with HON-ACADEMY — contact details, location, social media, and message form." />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
  .social-card{border:1px solid #e9ecef;border-radius:.75rem;padding:1.25rem;transition:.25s;background:#fff;text-decoration:none;color:inherit;display:block}
  .social-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);color:inherit}
  .social-card .social-icon{width:48px;height:48px;border-radius:.6rem;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
  .map-placeholder{background:#e9ecef;border-radius:.75rem;min-height:220px;display:flex;align-items:center;justify-content:center;color:#6c757d;font-size:.9rem}
  .contact-info-row{display:flex;align-items:flex-start;gap:1rem;padding:.85rem 0;border-bottom:1px solid #f0f0f0}
  .contact-info-row:last-child{border-bottom:none}
  .contact-info-row .ci-icon{width:42px;height:42px;border-radius:.55rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .contact-info-row h6{margin:0;font-size:.88rem;font-weight:600}
  .contact-info-row p{margin:0;font-size:.82rem;color:#6c757d}
</style>
</head>
<body class="animate-fade-in">
<header class="site-header"></header>
<section class="page-banner">
  <div class="container">
    <div class="breadcrumb-custom"><a href="index.html">Home</a><span>/</span><span class="current">Contact Us</span></div>
    <h1>Contact Us</h1>
    <p id="page-intro">Have a question or need assistance? Reach out to us.</p>
  </div>
</section>

<main class="container my-5">
  <div class="row g-5">

    <!-- Left Column: Form -->
    <div class="col-lg-7">
      <div class="card border-0 bg-white p-4 p-md-5">
        <h4 class="font-bold text-dark mb-4"><i class="fa-solid fa-paper-plane text-primary me-2"></i>Send Us a Message</h4>
        <form id="contact-form">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label font-bold small">Full Name</label>
              <input type="text" class="form-control rounded-pill" id="contact-name" placeholder="Your full name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label font-bold small">Email Address</label>
              <input type="email" class="form-control rounded-pill" id="contact-email" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label font-bold small">Subject</label>
            <select class="form-select rounded-pill" id="contact-subject">
              <option value="General Inquiry">General Inquiry</option>
              <option value="Admissions">Admissions</option>
              <option value="Technical Support">Technical Support</option>
              <option value="Feedback">Feedback</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label font-bold small">Message</label>
            <textarea class="form-control" id="contact-message" rows="5" placeholder="Type your message here..." style="border-radius:1rem" required></textarea>
          </div>
          <button type="submit" class="btn btn-nca-blue rounded-pill px-5">
            <i class="fa-solid fa-paper-plane me-2"></i>Send Message
          </button>
        </form>
      </div>

      <!-- Map Placeholder -->
      <div class="map-placeholder mt-4" id="map-area">
        <div class="text-center">
          <i class="fa-solid fa-map-location-dot fs-2 mb-2 d-block"></i>
          <span>KG 7 Avenue, Kigali, Rwanda</span>
        </div>
      </div>
    </div>

    <!-- Right Column: Info + Socials -->
    <div class="col-lg-5">

      <!-- Contact Information -->
      <div class="card border-0 bg-white p-4 mb-4">
        <h4 class="font-bold text-dark mb-3"><i class="fa-solid fa-circle-info text-success me-2"></i>Contact Information</h4>
        <div id="contact-info-list"></div>
      </div>

      <!-- Our Channels -->
      <div class="card border-0 bg-white p-4 mb-4">
        <h5 class="font-bold text-dark mb-3"><i class="fa-solid fa-tower-broadcast text-primary me-2"></i>Our Channels</h5>
        <p class="small text-muted mb-3">Follow us on our official platforms for updates, resources and community.</p>
        <div class="row g-3" id="social-channels-grid"></div>
      </div>

      <!-- Quick Social Follow -->
      <div class="card border-0 bg-white p-4">
        <h5 class="font-bold text-dark mb-3">Connect With Us</h5>
        <div class="d-flex flex-wrap gap-2" id="contact-socials"></div>
      </div>

    </div>
  </div>
</main>

<footer class="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
(function() {
  var school = db.getSchoolInfo();
  var site   = db.getSiteSettings();

  document.getElementById('page-intro').textContent = school.contactIntro || 'Have a question or need assistance? Reach out to us.';

  var address = school.address || 'KG 7 Ave, Kigali, Rwanda';
  var phone   = school.phone   || '+250 791 684 429';
  var email   = school.email   || 'tuyishimehonore63@gmail.com';
  var hours   = site.officeHours || 'Mon – Fri, 7:30 AM – 5:00 PM';

  // Contact info rows
  var infoItems = [
    { icon:'fa-location-dot', color:'primary', label:'Address',   val:address },
    { icon:'fa-phone',       color:'success', label:'Phone',     val:phone },
    { icon:'fa-envelope',    color:'warning', label:'Email',     val:email },
    { icon:'fa-clock',       color:'info',    label:'Office Hours', val:hours }
  ];
  document.getElementById('contact-info-list').innerHTML = infoItems.map(function(item) {
    return '<div class="contact-info-row">'
      + '<div class="ci-icon bg-'+item.color+' bg-opacity-10 text-'+item.color+'"><i class="fa-solid '+item.icon+'"></i></div>'
      + '<div><h6>'+item.label+'</h6><p>'+item.val+'</p></div></div>';
  }).join('');

  // Social channels grid
  var socialLinks = site.socialLinks || {};
  var channels = [
    { platform:'GitHub',      icon:'fa-brands fa-github',     color:'#24292e', url:socialLinks.github   || 'https://github.com/honore63' },
    { platform:'Twitter / X', icon:'fa-brands fa-x-twitter',  color:'#1da1f2', url:socialLinks.twitter  || 'https://twitter.com/THonore78575' },
    { platform:'LinkedIn',    icon:'fa-brands fa-linkedin-in', color:'#0a66c2', url:socialLinks.linkedin || 'https://linkedin.com/in/tuyishime-honore-5a57762a1' },
    { platform:'YouTube',     icon:'fa-brands fa-youtube',     color:'#ff0000', url:socialLinks.youtube  || 'https://youtube.com/@TuyishimeHonore-qt9hd' },
    { platform:'WhatsApp',    icon:'fa-brands fa-whatsapp',    color:'#25d366', url:socialLinks.whatsapp ? 'https://wa.me/'+socialLinks.whatsapp.replace(/[^0-9]/g,'') : 'https://wa.me/250791684429' }
  ];
  document.getElementById('social-channels-grid').innerHTML = channels.map(function(ch) {
    return '<div class="col-6">'
      + '<a href="'+ch.url+'" target="_blank" rel="noopener" class="social-card">'
      + '<div class="d-flex align-items-center gap-3">'
      + '<div class="social-icon" style="background:'+ch.color+'15;color:'+ch.color+'"><i class="'+ch.icon+'"></i></div>'
      + '<div><h6 class="mb-0" style="font-size:.85rem">'+ch.platform+'</h6>'
      + '<span class="small" style="color:#6c757d;font-size:.75rem">Follow us</span></div>'
      + '</div></a></div>';
  }).join('');

  // Quick social buttons
  var socials = [
    { icon:'fa-github',      color:'dark',  url:channels[0].url },
    { icon:'fa-x-twitter',   color:'info',  url:channels[1].url },
    { icon:'fa-linkedin-in', color:'primary',url:channels[2].url },
    { icon:'fa-youtube',     color:'danger', url:channels[3].url },
    { icon:'fa-whatsapp',    color:'success',url:channels[4].url }
  ];
  document.getElementById('contact-socials').innerHTML = socials.map(function(s) {
    return '<a href="'+s.url+'" target="_blank" rel="noopener" class="btn btn-outline-'+s.color+' rounded-circle d-flex align-items-center justify-content-center" style="width:44px;height:44px"><i class="fa-brands '+s.icon+'"></i></a>';
  }).join('');
})();

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();
  showToast("Thank you! Your message has been sent successfully.", "success");
  e.target.reset();
});
</script>
</body>
</html>
