<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses - HON-ACADEMY</title>
  <meta name="description" content="Browse all available courses across Primary, Lower Secondary and Upper Secondary levels." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .catalog-filter{background:#fff;border:1px solid #e7ecf3;border-radius:1rem;padding:1.5rem;box-shadow:0 2px 8px rgba(15,23,42,.04)}
    .catalog-filter label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:.35rem}
    .catalog-filter .form-control,.catalog-filter .form-select{border:1.5px solid #e7ecf3;border-radius:.65rem;padding:.5rem .85rem;font-size:.88rem;background:#f8fafc}
    .catalog-filter .form-control:focus,.catalog-filter .form-select:focus{border-color:var(--nca-blue,#1a3c7b);box-shadow:0 0 0 3px rgba(26,60,123,.1)}

    .course-card{border:1px solid #e7ecf3;border-radius:1rem;overflow:hidden;background:#fff;transition:all .25s;height:100%;display:flex;flex-direction:column}
    .course-card:hover{box-shadow:0 10px 30px -12px rgba(26,60,123,.3);border-color:#c7d6ee;transform:translateY(-3px)}
    .course-card .card-body{padding:1.35rem;display:flex;flex-direction:column;flex:1}
    .course-card .course-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:.2rem .7rem;border-radius:2rem;display:inline-block}
    .course-card h3{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.1rem;margin:.5rem 0 .35rem;color:#1e293b}
    .course-card p{font-size:.82rem;color:#64748b;line-height:1.5;flex-grow:1}
    .course-card .meta-row{display:flex;gap:1rem;padding-top:.75rem;border-top:1px solid #f1f5f9;margin-top:auto}
    .course-card .meta-row span{font-size:.75rem;color:#94a3b8;display:flex;align-items:center;gap:.35rem}
    .course-card .meta-row strong{color:#1e293b;font-weight:600}

    .level-section h4{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.15rem;color:#1e293b;display:flex;align-items:center;gap:.6rem}
    .level-section h4 span{font-size:.72rem;font-weight:600;padding:.2rem .7rem;border-radius:2rem}

    .empty-state{text-align:center;padding:3.5rem 1rem;color:#64748b}
    .empty-state i{font-size:2.5rem;color:#cbd5e1;display:block;margin-bottom:.6rem}
    @media(max-width:767.98px){.catalog-filter .row{gap:.75rem}}
  </style>
</head>
<body class="animate-fade-in">

  <header class="site-header"></header>

  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb-custom">
        <a href="index.html">Home</a><span>/</span>
        <a href="subjects.html">Academics</a><span>/</span>
        <span class="current">Courses</span>
      </div>
      <h1>Courses</h1>
      <p id="page-intro">Browse all courses across Primary, Lower Secondary and Upper Secondary levels.</p>
    </div>
  </section>

  <main class="container my-5">

    <!-- Filters -->
    <div class="catalog-filter mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="search-input"><i class="fa-solid fa-search me-1"></i>Search Courses</label>
          <input type="text" id="search-input" class="form-control" placeholder="Search by title, subject or description..." />
        </div>
        <div class="col-md-3">
          <label for="subject-filter"><i class="fa-solid fa-book me-1"></i>Subject</label>
          <select id="subject-filter" class="form-select"><option value="all">All Subjects</option></select>
        </div>
        <div class="col-md-3">
          <label for="class-filter"><i class="fa-solid fa-users me-1"></i>Class</label>
          <select id="class-filter" class="form-select">
            <option value="all">All Classes</option>
            <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option>
            <option value="P4">P4</option><option value="P5">P5</option><option value="P6">P6</option>
            <option value="S1">S1</option><option value="S2">S2</option><option value="S3">S3</option>
            <option value="S4">S4</option><option value="S5">S5</option><option value="S6">S6</option>
          </select>
        </div>
        <div class="col-md-2">
          <label for="level-filter"><i class="fa-solid fa-layer-group me-1"></i>Level</label>
          <select id="level-filter" class="form-select">
            <option value="all">All Levels</option>
            <option value="Primary">Primary</option>
            <option value="Lower Secondary">Lower Secondary</option>
            <option value="Upper Secondary">Upper Secondary</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Count -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="text-muted small" id="course-count">Loading courses...</p>
      <button class="btn btn-sm btn-outline-primary" onclick="document.querySelector('.catalog-filter').classList.toggle('d-none')"><i class="fa-solid fa-sliders me-1"></i>Toggle Filters</button>
    </div>

    <!-- Loading -->
    <div id="loading-state" class="text-center py-5">
      <div class="spinner-border text-primary mb-2" role="status"><span class="visually-hidden">Loading...</span></div>
      <p class="text-muted small">Loading courses...</p>
    </div>

    <!-- Content -->
    <div id="course-content" class="d-none"></div>

  </main>

  <!-- Preview Modal -->
  <div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title font-bold" id="previewModalTitle">Course Preview</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-3" id="previewModalBody">
          <div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
        <div class="modal-footer border-0 pt-0" id="previewModalFooter" style="display:none">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal"><i class="fa-solid fa-times me-1"></i>Close</button>
          <button class="btn btn-success" id="previewDownloadBtn"><i class="fa-solid fa-download me-1"></i>Download Syllabus</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-data.js"></script>
  <script src="js/rbac.js"></script>
  <script src="js/assessments.js"></script>
  <script src="js/db-extension.js"></script>
  <script src="js/components.js"></script>
  <script>
  (function() {
    'use strict';

    var searchVal = '', subjectVal = 'all', classVal = 'all', levelVal = 'all';

    // Level colors for tag badges
    var levelColors = { Primary:'success', 'Lower Secondary':'info', 'Upper Secondary':'primary' };

    document.addEventListener('DOMContentLoaded', function() {
      // Populate subject filter
      var subjects = window.db.getSubjects();
      var subjectSelect = document.getElementById('subject-filter');
      subjects.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.title;
        opt.textContent = s.title;
        subjectSelect.appendChild(opt);
      });

      // Event listeners
      document.getElementById('search-input').addEventListener('input', function(e) { searchVal = e.target.value.toLowerCase().trim(); render(); });
      document.getElementById('subject-filter').addEventListener('change', function(e) { subjectVal = e.target.value; render(); });
      document.getElementById('class-filter').addEventListener('change', function(e) { classVal = e.target.value; render(); });
      document.getElementById('level-filter').addEventListener('change', function(e) { levelVal = e.target.value; render(); });

      render();
    });

    function render() {
      var allCourses = window.db.getCourses();

      var filtered = allCourses.filter(function(c) {
        if (searchVal && !c.title.toLowerCase().includes(searchVal) && !c.description.toLowerCase().includes(searchVal) && !c.subject.toLowerCase().includes(searchVal)) return false;
        if (subjectVal !== 'all' && c.subject !== subjectVal) return false;
        if (classVal !== 'all' && c.className !== classVal) return false;
        if (levelVal !== 'all' && c.level !== levelVal) return false;
        return true;
      });

      var container = document.getElementById('course-content');
      var loading = document.getElementById('loading-state');
      var countEl = document.getElementById('course-count');

      loading.classList.add('d-none');
      container.classList.remove('d-none');
      countEl.textContent = 'Showing ' + filtered.length + ' course' + (filtered.length !== 1 ? 's' : '');

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-book-open"></i><h5>No courses found</h5><p class="text-muted">Try adjusting your filters or search terms.</p></div>';
        return;
      }

      // Group by level (preserve order: Primary → Lower Secondary → Upper Secondary)
      var levelOrder = ['Primary','Lower Secondary','Upper Secondary'];
      var grouped = {};
      filtered.forEach(function(c) {
        if (!grouped[c.level]) grouped[c.level] = [];
        grouped[c.level].push(c);
      });

      var html = '';
      levelOrder.forEach(function(level) {
        var courses = grouped[level];
        if (!courses) return;
        var color = levelColors[level] || 'secondary';
        html += '<div class="level-section mb-4"><h4><span class="badge bg-' + color + ' bg-opacity-10 text-' + color + ' px-3 py-1">' + level + '</span><small class="fw-normal text-muted" style="font-size:.82rem">' + courses.length + ' course' + (courses.length !== 1 ? 's' : '') + '</small></h4><div class="row g-3">';
        courses.forEach(function(c) {
          var ins = window.db.getUser(c.instructorId);
          var insName = ins ? (ins.fullName || ins.name || 'Instructor') : 'Staff';
          html += '<div class="col-sm-6 col-lg-4"><div class="course-card"><div class="card-body">';
          html += '<div class="d-flex justify-content-between align-items-start"><span class="course-badge bg-' + color + ' bg-opacity-10 text-' + color + '"><i class="fa-solid fa-book me-1"></i>' + escHtml(c.subject) + '</span><span class="badge bg-light text-muted px-2 py-1" style="font-size:.68rem">' + escHtml(c.className) + '</span></div>';
          html += '<h3>' + escHtml(c.title) + '</h3>';
          html += '<p>' + escHtml(c.description) + '</p>';
          html += '<div class="meta-row"><span><i class="fa-regular fa-clock"></i><strong>' + (c.duration || 0) + '</strong> min</span><span><i class="fa-regular fa-user"></i><strong>' + escHtml(insName) + '</strong></span><span><i class="fa-regular fa-users"></i><strong>' + (c.enrollmentCount || 0) + '</strong></span></div>';
          html += '<div class="mt-3 d-flex gap-2"><button class="btn btn-sm btn-outline-primary flex-grow-1" onclick="previewCourse(' + c.id + ')"><i class="fa-solid fa-eye me-1"></i>Preview</button><button class="btn btn-sm btn-outline-success" onclick="downloadCourse(' + c.id + ')" title="Download Syllabus"><i class="fa-solid fa-download"></i></button></div>';
          html += '</div></div></div>';
        });
        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    function escHtml(str) {
      return String(str||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
    }

  })();

  // ── Preview Course (global, called from onclick) ──
  window.previewCourse = function(courseId) {
    var course = window.db.getCourse(courseId);
    if (!course) { alert('Course not found'); return; }
    var syllabus = window.db.getCourseSyllabus(course);
    var ins = window.db.getUser(course.instructorId);
    var insName = ins ? (ins.fullName || ins.name || 'Instructor') : 'Staff';

    document.getElementById('previewModalTitle').textContent = course.title;
    var body = document.getElementById('previewModalBody');
    var footer = document.getElementById('previewModalFooter');
    footer.style.display = '';
    document.getElementById('previewDownloadBtn').onclick = function() { downloadCourse(courseId); };

    body.innerHTML =
      '<div class="row g-4">' +
        '<div class="col-md-7">' +
          '<div class="mb-3"><span class="badge bg-primary bg-opacity-10 text-primary me-2">' + escHtml(course.subject) + '</span><span class="badge bg-light text-muted">' + escHtml(course.className) + '</span></div>' +
          '<h6 class="font-bold mb-2">About This Course</h6>' +
          '<p class="text-muted small" style="line-height:1.7">' + escHtml(course.description) + '</p>' +
          '<h6 class="font-bold mt-4 mb-2"><i class="fa-solid fa-list me-2 text-primary"></i>Syllabus Outline</h6>' +
          '<div class="syllabus-list">' +
            syllabus.map(function(s) {
              return '<div class="d-flex align-items-start gap-2 mb-2 pb-2 border-bottom"><span class="badge bg-primary rounded-circle" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0">' + s.week + '</span><div><div class="fw-semibold small">' + escHtml(s.topic) + '</div><div class="text-muted" style="font-size:.75rem">' + escHtml(s.description) + '</div></div></div>';
            }).join('') +
          '</div>' +
        '</div>' +
        '<div class="col-md-5">' +
          '<div class="bg-light rounded-3 p-3 mb-3"><h6 class="font-bold small text-uppercase mb-2"><i class="fa-solid fa-circle-info me-2"></i>Course Info</h6>' +
            '<div class="d-flex justify-content-between py-1 border-bottom small"><span class="text-muted">Duration</span><strong>' + (course.duration || 0) + ' min</strong></div>' +
            '<div class="d-flex justify-content-between py-1 border-bottom small"><span class="text-muted">Level</span><strong>' + escHtml(course.level) + '</strong></div>' +
            '<div class="d-flex justify-content-between py-1 border-bottom small"><span class="text-muted">Class</span><strong>' + escHtml(course.className) + '</strong></div>' +
            '<div class="d-flex justify-content-between py-1 border-bottom small"><span class="text-muted">Subject</span><strong>' + escHtml(course.subject) + '</strong></div>' +
            '<div class="d-flex justify-content-between py-1 small"><span class="text-muted">Instructor</span><strong>' + escHtml(insName) + '</strong></div>' +
          '</div>' +
          '<div class="bg-light rounded-3 p-3 text-center"><i class="fa-solid fa-chalkboard-user text-primary" style="font-size:1.5rem"></i><h6 class="font-bold mt-2 mb-1 small">' + escHtml(insName) + '</h6><p class="text-muted mb-0" style="font-size:.72rem">Course Instructor</p></div>' +
        '</div>' +
      '</div>';

    var modal = new bootstrap.Modal(document.getElementById('previewModal'));
    modal.show();
  };

  window.downloadCourse = function(courseId) {
    var course = window.db.getCourse(courseId);
    if (!course) { alert('Course not found'); return; }
    var content = window.db.generateCourseDownload(course);
    var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (course.title || 'course').replace(/[^a-zA-Z0-9]/g, '_') + '_syllabus.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  </script>
</body>
</html>
