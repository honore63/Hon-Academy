<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses - HON-ACADEMY</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "oklch(var(--border) / <alpha-value>)",
              background: "oklch(var(--background) / <alpha-value>)",
              foreground: "oklch(var(--foreground) / <alpha-value>)",
              primary: {
                DEFAULT: "#1d4ed8",
                foreground: "#eff6ff",
              },
              secondary: {
                DEFAULT: "#f4f4f5",
                foreground: "#18181b",
              },
              accent: {
                DEFAULT: "#f4f4f5",
                foreground: "#18181b",
              },
              muted: {
                DEFAULT: "#f4f4f5",
                foreground: "#71717a",
              }
            }
          }
        }
      }
    </script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-zinc-100 min-h-screen flex flex-col transition-colors duration-200">
    <!-- Navigation Header -->
    <header class="site-header"></header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto px-4 py-12 animate-fade-in">
      
      <!-- Page Header -->
      <div class="mb-10 space-y-2">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight">Explore Courses</h1>
        <p class="text-sm md:text-base text-gray-500 dark:text-zinc-400">
          Discover a wide range of subjects and modules prepared for student excellence.
        </p>
      </div>

      <!-- Filters Panel -->
      <div class="bg-white dark:bg-zinc-900 border border-gray-100 dark:border-zinc-850 rounded-2xl p-6 shadow-sm mb-8 transition-colors">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Search Bar -->
          <div class="space-y-2">
            <label for="search-input" class="text-xs font-bold text-gray-400 dark:text-zinc-500 uppercase tracking-wider">Search Courses</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4"></i>
              </span>
              <input
                type="text"
                id="search-input"
                placeholder="Search course title or description..."
                class="w-full pl-9 pr-4 py-2 text-sm bg-gray-50 dark:bg-zinc-850 border border-gray-200 dark:border-zinc-850 rounded-xl focus:border-blue-500 focus:outline-none dark:text-white"
              />
            </div>
          </div>

          <!-- Subject Filter -->
          <div class="space-y-2">
            <label for="subject-filter" class="text-xs font-bold text-gray-400 dark:text-zinc-500 uppercase tracking-wider">Filter by Subject</label>
            <select
              id="subject-filter"
              class="w-full px-3 py-2 text-sm bg-gray-50 dark:bg-zinc-850 border border-gray-200 dark:border-zinc-850 rounded-xl focus:border-blue-500 focus:outline-none dark:text-white"
            >
              <option value="all">All Subjects</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Science">Science</option>
              <option value="English">English</option>
              <option value="History">History</option>
            </select>
          </div>

          <!-- Grade Level Filter -->
          <div class="space-y-2">
            <label for="grade-filter" class="text-xs font-bold text-gray-400 dark:text-zinc-500 uppercase tracking-wider">Filter by Grade Level</label>
            <select
              id="grade-filter"
              class="w-full px-3 py-2 text-sm bg-gray-50 dark:bg-zinc-850 border border-gray-200 dark:border-zinc-850 rounded-xl focus:border-blue-500 focus:outline-none dark:text-white"
            >
              <option value="all">All Grades</option>
              <option value="Grade 6">Grade 6</option>
              <option value="Grade 7">Grade 7</option>
              <option value="Grade 8">Grade 8</option>
              <option value="Grade 9">Grade 9</option>
              <option value="Grade 10">Grade 10</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Course Count & Feed -->
      <div class="flex justify-between items-center mb-6">
        <p id="course-count-text" class="text-xs font-semibold text-gray-400 dark:text-zinc-500 uppercase tracking-wider">
          Loading catalog...
        </p>
      </div>

      <!-- Courses Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="catalog-grid">
        <!-- Dyn pop -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20 border border-dashed border-gray-250 dark:border-zinc-800 rounded-3xl space-y-4">
        <div class="w-12 h-12 bg-gray-100 dark:bg-zinc-900 rounded-full flex items-center justify-center mx-auto text-gray-400">
          <i data-lucide="book-x" class="w-6 h-6"></i>
        </div>
        <div>
          <h3 class="font-bold text-gray-800 dark:text-zinc-200">No courses match filters</h3>
          <p class="text-sm text-gray-400 max-w-xs mx-auto">Try updating your filters or search keywords to locate specific modules.</p>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="site-footer"></footer>

    <!-- Database and Component scripts -->
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>

    <!-- Page script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        setupCatalogFilters();
        renderCatalog();
        window.addEventListener("auth_change", renderCatalog);
      });

      let searchVal = "";
      let subjectVal = "all";
      let gradeVal = "all";

      function setupCatalogFilters() {
        const searchInput = document.getElementById("search-input");
        const subjectFilter = document.getElementById("subject-filter");
        const gradeFilter = document.getElementById("grade-filter");

        searchInput.addEventListener("input", (e) => {
          searchVal = e.target.value.toLowerCase().trim();
          renderCatalog();
        });

        subjectFilter.addEventListener("change", (e) => {
          subjectVal = e.target.value;
          renderCatalog();
        });

        gradeFilter.addEventListener("change", (e) => {
          gradeVal = e.target.value;
          renderCatalog();
        });
      }

      function renderCatalog() {
        const grid = document.getElementById("catalog-grid");
        const emptyState = document.getElementById("empty-state");
        const countText = document.getElementById("course-count-text");
        
        let courses = window.db.getCourses();

        // Apply filters
        courses = courses.filter(c => {
          const matchesSearch = c.title.toLowerCase().includes(searchVal) || c.description.toLowerCase().includes(searchVal);
          const matchesSubject = subjectVal === "all" || c.subject === subjectVal;
          const matchesGrade = gradeVal === "all" || c.gradeLevel === gradeVal;
          return matchesSearch && matchesSubject && matchesGrade;
        });

        // Update count text
        countText.innerText = `Showing ${courses.length} course${courses.length === 1 ? "" : "s"}`;

        if (courses.length === 0) {
          grid.innerHTML = "";
          emptyState.classList.remove("hidden");
          return;
        }

        emptyState.classList.add("hidden");

        grid.innerHTML = courses.map(course => {
          const ins = window.db.getUser(course.instructorId);
          const insName = ins ? ins.name : "TBD";
          
          return `
            <a href="course-detail.html?id=${course.id}" class="bg-white dark:bg-zinc-900 border border-gray-100 dark:border-zinc-850 rounded-2xl shadow-sm hover:shadow-lg hover:border-blue-500/30 transition-all overflow-hidden flex flex-col group">
              <div class="p-6 flex-1 flex flex-col justify-between space-y-4">
                <div class="space-y-2">
                  <div class="flex justify-between items-start">
                    <span class="inline-block px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-blue-50 text-blue-600 dark:bg-blue-950/80 dark:text-blue-400">
                      ${course.subject}
                    </span>
                    <span class="inline-block px-2 py-0.5 rounded text-[10px] font-semibold bg-gray-100 text-gray-600 dark:bg-zinc-850 dark:text-zinc-400">
                      ${course.gradeLevel}
                    </span>
                  </div>
                  <h3 class="font-extrabold text-gray-900 dark:text-white text-xl line-clamp-1 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                    ${course.title}
                  </h3>
                  <p class="text-sm text-gray-500 dark:text-zinc-400 line-clamp-2 leading-relaxed">
                    ${course.description}
                  </p>
                </div>

                <div class="space-y-3">
                  <div class="flex items-center gap-2 text-xs font-medium text-gray-400">
                    <i data-lucide="user" class="w-3.5 h-3.5"></i>
                    <span>Instructor: <strong class="text-gray-600 dark:text-zinc-300 font-semibold">${insName}</strong></span>
                  </div>

                  <div class="flex items-center gap-6 pt-4 border-t border-gray-100 dark:border-zinc-800 text-xs font-medium text-gray-400">
                    <div class="flex items-center gap-1">
                      <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                      <span>${course.duration || 0} min</span>
                    </div>
                    <div class="flex items-center gap-1">
                      <i data-lucide="users" class="w-3.5 h-3.5"></i>
                      <span>${course.enrollmentCount || 0} enrolled</span>
                    </div>
                  </div>
                </div>
              </div>
            </a>
          `;
        }).join("");

        lucide.createIcons();
      }
    </script>
  </body>
</html>
