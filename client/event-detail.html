<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event - HON-ACADEMY</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="animate-fade-in bg-light">
<header class="site-header"></header>
<main class="container my-5">
<nav aria-label="breadcrumb" class="mb-4">
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="index.html">Home</a></li>
<li class="breadcrumb-item active" id="breadcrumb-event">Event</li>
</ol>
</nav>
<div class="card border-0 bg-white p-5 mx-auto" style="max-width:800px;">
<span class="badge bg-success mb-2" id="event-status"></span>
<h1 class="display-6 font-bold mb-3" id="event-title">Loading...</h1>
<div class="d-flex flex-wrap gap-4 text-muted small mb-4">
<span><i class="fa-regular fa-calendar me-1"></i><span id="event-date"></span></span>
<span><i class="fa-solid fa-location-dot me-1"></i><span id="event-location"></span></span>
</div>
<img id="event-image" src="" alt="" class="img-fluid rounded-3 mb-4" style="display:none;max-height:400px;width:100%;object-fit:cover;">
<div class="text-muted leading-relaxed" id="event-description" style="font-size:1.05rem;line-height:1.8;"></div>
<a href="index.html" class="btn btn-outline-primary mt-4"><i class="fa-solid fa-arrow-left me-1"></i>Back to Home</a>
</div>
</main>
<footer class="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
(function() {
var params = new URLSearchParams(window.location.search);
var id = params.get('id');
var event = window.db.getEvent(id);
var school = window.db.getSchoolInfo();
if (!event) {
document.getElementById('event-title').textContent = 'Event not found';
document.getElementById('event-description').innerHTML = '<p class="text-muted">This event does not exist or has been removed.</p><a href="index.html" class="btn btn-primary mt-3">Back to Home</a>';
return;
}
document.title = event.title + ' - ' + school.name;
document.getElementById('breadcrumb-event').textContent = event.title;
document.getElementById('event-title').textContent = event.title;
document.getElementById('event-date').textContent = new Date(event.date||event.createdAt).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
document.getElementById('event-location').textContent = event.location || 'Not specified';
document.getElementById('event-description').innerHTML = (event.description||'No description available.').replace(/\n/g, '<br>');
document.getElementById('event-status').textContent = event.status||'published';
if (event.image) {
var img = document.getElementById('event-image');
img.src = event.image;
img.alt = event.title;
img.style.display = 'block';
}
})();
</script>
</body>
</html>
