<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Article - HON-ACADEMY</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="animate-fade-in bg-light">
<header class="site-header"></header>
<main class="container my-5">
<nav aria-label="breadcrumb" class="mb-4">
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="index.html">Home</a></li>
<li class="breadcrumb-item"><a href="announcements.html">News</a></li>
<li class="breadcrumb-item active" id="breadcrumb-title">Article</li>
</ol>
</nav>
<div class="row g-5">
<div class="col-lg-8">
<article class="card border-0 bg-white p-5">
<span class="badge bg-primary mb-2" id="article-category"></span>
<h1 class="display-6 font-bold mb-3" id="article-title">Loading...</h1>
<div class="d-flex align-items-center gap-3 text-muted small mb-4">
<span><i class="fa-regular fa-calendar me-1"></i><span id="article-date"></span></span>
<span><i class="fa-solid fa-user me-1"></i><span id="article-author"></span></span>
<span><i class="fa-regular fa-eye me-1"></i><span id="article-views">0</span> views</span>
</div>
<img id="article-image" src="" alt="" class="img-fluid rounded-3 mb-4" style="display:none;max-height:400px;width:100%;object-fit:cover;">
<div class="text-muted leading-relaxed" id="article-content" style="font-size:1.05rem;line-height:1.8;"></div>
</article>
</div>
<div class="col-lg-4">
<div class="card border-0 bg-white p-4">
<h5 class="font-bold mb-3">Recent News</h5>
<div id="recent-news-list"></div>
</div>
</div>
</div>
</main>
<footer class="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-data.js"></script>
<script src="js/components.js"></script>
<script>
(function() {
var params = new URLSearchParams(window.location.search);
var id = params.get('id');
var news = window.db.getNewsArticle(id);
var school = window.db.getSchoolInfo();
if (!news) {
document.getElementById('article-title').textContent = 'Article not found';
document.getElementById('article-content').innerHTML = '<p class="text-muted">The article you are looking for does not exist or has been removed.</p><a href="announcements.html" class="btn btn-primary mt-3">Back to News</a>';
return;
}
document.title = news.title + ' - ' + school.name;
document.getElementById('breadcrumb-title').textContent = news.title;
document.getElementById('article-category').textContent = news.category || 'School News';
document.getElementById('article-title').textContent = news.title;
document.getElementById('article-date').textContent = new Date(news.createdAt).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
document.getElementById('article-author').textContent = news.author || 'Admin';
document.getElementById('article-content').innerHTML = news.content.replace(/\n/g, '<br>');
// Increment views
var views = (news.views||0) + 1;
window.db.updateNews(id, { views: views });
document.getElementById('article-views').textContent = views;
if (news.image) {
var img = document.getElementById('article-image');
img.src = news.image;
img.alt = news.title;
img.style.display = 'block';
}
// Recent news sidebar
var recent = window.db.getRecentNews(5).filter(function(n){ return n.id !== Number(id); });
var list = document.getElementById('recent-news-list');
if (recent.length) {
list.innerHTML = recent.map(function(n) {
return '<a href="news-detail.html?id='+n.id+'" class="d-block text-decoration-none mb-3 pb-3 border-bottom"><h6 class="font-bold text-dark mb-1">'+n.title+'</h6><span class="small text-muted">'+new Date(n.createdAt).toLocaleDateString()+'</span></a>';
}).join('');
} else {
list.innerHTML = '<p class="text-muted small mb-0">No other recent news.</p>';
}
})();
</script>
</body>
</html>
