<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Events - HON-ACADEMY</title>
<meta name="description" content="Stay updated with the latest news, events, and announcements from HON-ACADEMY." />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="animate-fade-in">
<header class="site-header"></header>
<section class="page-banner">
<div class="container">
<div class="breadcrumb-custom"><a href="index.html">Home</a><span>/</span><span class="current">News & Events</span></div>
<h1>News & Events</h1>
<p>Stay informed with the latest happenings at our school.</p>
</div>
</section>
<main class="container my-5">
<ul class="nav nav-pills justify-content-center gap-2 mb-5" id="newsEventsTabs">
<li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-all">All</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-news">News</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-events">Events</button></li>
</ul>
<div class="tab-content">
<div class="tab-pane fade show active" id="tab-all">
<div class="row g-4" id="all-grid"></div>
</div>
<div class="tab-pane fade" id="tab-news">
<div class="row g-4" id="news-grid"></div>
</div>
<div class="tab-pane fade" id="tab-events">
<div class="row g-4" id="events-grid"></div>
</div>
</div>
</main>
<footer class="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
(function() {
var school = window.db.getSchoolInfo();
document.title = 'News & Events - ' + school.name;
var news = window.db.getPublishedNews ? window.db.getPublishedNews() : [];
var events = window.db.getPublishedEvents ? window.db.getPublishedEvents() : [];
var all = [].concat(news.map(function(n){ n._type='news'; return n; }), events.map(function(e){ e._type='event'; return e; }));
all.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
function renderCards(arr, gridId) {
var grid = document.getElementById(gridId);
if (!grid) return;
if (!arr.length) { grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="fa-solid fa-newspaper"></i><h5>No content yet</h5><p>Content will appear here once published.</p></div></div>'; return; }
grid.innerHTML = arr.map(function(item) {
var isNews = item._type === 'news';
var date = new Date(item.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
var link = isNews ? 'news-detail.html?id=' + item.id : 'event-detail.html?id=' + item.id;
var desc = isNews ? (item.content||'').substring(0,120) : (item.description||'').substring(0,120);
if (desc.length > 115) desc += '...';
var badge = isNews ? (item.category||'News') : 'Event';
var badgeColor = isNews ? 'bg-primary' : 'bg-success';
return '<div class="col-md-6 col-lg-4"><a href="' + link + '" class="text-decoration-none"><div class="card border-0 bg-white h-100 shadow-sm"><div class="card-body p-4"><span class="badge ' + badgeColor + ' mb-2">' + badge + '</span><h6 class="font-bold text-dark mb-2">' + item.title + '</h6><p class="small text-muted mb-3">' + desc + '</p><div class="d-flex justify-content-between align-items-center"><small class="text-muted">' + date + '</small></div></div></div></a></div>';
}).join('');
}
renderCards(all, 'all-grid');
renderCards(news, 'news-grid');
renderCards(events, 'events-grid');
})();
</script>
</body>
</html>
