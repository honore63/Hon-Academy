<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource View - HON-ACADEMY</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;margin:0;padding:0;overflow-x:hidden}
.top-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar a{color:#64748b;text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px}
.top-bar a:hover{color:#1e3a8a}
.detail-wrap{max-width:1060px;margin:0 auto;padding:32px 24px}
.breadcrumb{font-size:13px;color:#94a3b8;margin-bottom:20px}
.breadcrumb a{color:#64748b;text-decoration:none}
.breadcrumb a:hover{color:#1e3a8a}
.breadcrumb span{color:#334155;font-weight:500}
.detail-header{margin-bottom:28px}
.detail-header h1{font-family:'Poppins',sans-serif;font-size:28px;font-weight:700;color:#0f172a;margin:0 0 8px}
.detail-header .meta{display:flex;flex-wrap:wrap;gap:16px;color:#64748b;font-size:13px}
.detail-header .meta span{display:flex;align-items:center;gap:5px}
.detail-header .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.detail-header .actions button{padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;font-family:'Inter',sans-serif}
.btn-primary-bg{background:#1e3a8a;color:#fff}
.btn-primary-bg:hover{background:#1e40af}
.btn-outline-bg{background:transparent;color:#475569;border:1.5px solid #e2e8f0}
.btn-outline-bg:hover{background:#f8fafc}
/* Preview area */
.preview-area{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;margin-bottom:28px;min-height:200px}
.preview-area .preview-header{padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.preview-area .preview-header span{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.preview-area .preview-body{padding:24px;display:flex;align-items:center;justify-content:center;min-height:300px;background:#fafafa}
/* Video player */
.video-wrapper{width:100%;max-width:800px;background:#000;border-radius:12px;overflow:hidden}
.video-wrapper video{width:100%;display:block;max-height:500px}
/* Audio player */
.audio-wrapper{width:100%;max-width:600px;padding:40px 20px;text-align:center}
.audio-wrapper .audio-icon{width:80px;height:80px;border-radius:50%;background:#f0fdfa;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;color:#14b8a6}
.audio-wrapper audio{width:100%}
/* Simulated doc */
.simulated-doc{background:#fff;border-radius:12px;padding:32px;max-width:720px;width:100%;font-size:14px;line-height:1.8;color:#334155;max-height:500px;overflow-y:auto}
.simulated-doc h2{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;margin-bottom:12px}
.simulated-doc .doc-meta-table{width:100%;font-size:13px}
.simulated-doc .doc-meta-table td{padding:6px 0;color:#64748b;border-bottom:1px solid #f1f5f9}
.simulated-doc .doc-meta-table td:first-child{font-weight:600;color:#334155;width:120px}
/* Image gallery */
.image-viewer{display:flex;align-items:center;justify-content:center;flex-direction:column}
.image-viewer img{max-width:100%;max-height:500px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
/* Info sidebar row */
.info-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-bottom:32px}
.info-card{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;padding:20px}
.info-card h6{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:#0f172a;margin:0 0 12px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.info-row .lbl{color:#94a3b8;font-weight:500}
.info-row .val{color:#334155;font-weight:600;text-align:right}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.share-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
@media(max-width:768px){.info-grid{grid-template-columns:1fr}.detail-wrap{padding:20px 12px}.detail-header h1{font-size:22px}.top-bar{padding:10px 16px}}
</style>
</head>
<body>
<div class="top-bar">
<a href="public-resources.html"><i class="fa-solid fa-arrow-left"></i>Back to Resources</a>
<a href="public-resources.html"><i class="fa-solid fa-graduation-cap"></i>HON-ACADEMY</a>
</div>
<div class="detail-wrap">
<div class="breadcrumb"><a href="public-resources.html">Resources</a> <i class="fa-solid fa-chevron-right" style="font-size:10px;margin:0 6px;"></i> <span id="breadcrumb-title">Loading...</span></div>
<div class="detail-header" id="detail-header"></div>
<div class="preview-area" id="preview-area">
<div class="preview-header"><span>Preview</span></div>
<div class="preview-body" id="preview-body"><p style="color:#94a3b8;">Loading preview...</p></div>
</div>
<div class="info-grid">
<div class="info-card">
<h6><i class="fa-solid fa-circle-info text-primary me-2"></i>Description</h6>
<p id="resource-description" style="font-size:14px;color:#475569;line-height:1.7;"></p>
<h6 class="mt-4"><i class="fa-solid fa-list text-primary me-2"></i>Details</h6>
<div id="resource-details"></div>
</div>
<div class="info-card">
<h6><i class="fa-solid fa-chart-simple text-primary me-2"></i>Statistics</h6>
<div id="resource-stats"></div>
<h6 class="mt-4"><i class="fa-solid fa-share-nodes text-primary me-2"></i>Share</h6>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
<button class="btn btn-sm btn-outline-secondary" onclick="shareResource('email')" style="border-radius:8px;"><i class="fa-solid fa-envelope"></i> Email</button>
<button class="btn btn-sm btn-outline-secondary" onclick="shareResource('copy')" style="border-radius:8px;"><i class="fa-solid fa-link"></i> Copy Link</button>
</div>
<h6 class="mt-4"><i class="fa-solid fa-link text-primary me-2"></i>Related Resources</h6>
<div id="related-resources" style="font-size:13px;color:#94a3b8;"></div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
    <script src="js/db-extension.js"></script>
    <script src="js/components.js"></script>
<script>
(function() {
  const currentUser = window.db.getCurrentUser();
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const r = window.db.getResource(id);

  if (!r) {
    document.getElementById('breadcrumb-title').textContent = 'Not Found';
    document.getElementById('detail-header').innerHTML = '<div style="text-align:center;padding:60px;color:#94a3b8;"><i class="fa-solid fa-circle-exclamation" style="font-size:48px;margin-bottom:12px;"></i><h4>Resource Not Found</h4><p>This resource may have been removed or is no longer available.</p><a href="public-resources.html" class="btn btn-primary mt-3">Browse Resources</a></div>';
    document.getElementById('preview-area').style.display = 'none';
    return;
  }

  if (r.visibility !== 'public' && (!currentUser || currentUser.role !== 'admin')) {
    if (r.visibility === 'internal') { window.location.href = 'login.html'; return; }
    if (r.visibility === 'teacher-only' && (!currentUser || currentUser.role === 'student')) { window.location.href = 'login.html'; return; }
    if (r.visibility === 'student-only' && (!currentUser || currentUser.role !== 'student')) { window.location.href = 'login.html'; return; }
  }

  window.db.logResourceView(id);
  const ft = (r.fileType || 'txt').toLowerCase();
  document.getElementById('breadcrumb-title').textContent = r.title;
  document.title = r.title + ' - HON-ACADEMY Resources';

  const visColors = {public:'#dcfce7;color:#166534',internal:'#dbeafe;color:#1e40af','teacher-only':'#fef3c7;color:#92400e','student-only':'#ede9fe;color:#5b21b6'};
  document.getElementById('detail-header').innerHTML = `
    <h1>${r.title}</h1>
    <div class="meta">
      <span><i class="fa-regular fa-folder"></i>${r.category||'General'}</span>
      <span><i class="fa-regular fa-calendar"></i>${new Date(r.createdAt).toLocaleDateString()}</span>
      <span><i class="fa-regular fa-hard-drive"></i>${r.fileSize||'N/A'}</span>
      <span><i class="fa-solid fa-file"></i>${ft.toUpperCase()}</span>
      ${r.duration ? `<span><i class="fa-regular fa-clock"></i>${r.duration}</span>` : ''}
      <span><span class="share-badge" style="background:${visColors[r.visibility]||visColors.public}">${r.visibility||'public'}</span></span>
    </div>
    <div class="actions">
      ${(r.previewEnabled !== false && !['zip','rar'].includes(ft)) ? `<button class="btn-primary-bg" onclick="document.getElementById('preview-area').scrollIntoView({behavior:'smooth'})"><i class="fa-solid fa-eye"></i>Preview</button>` : ''}
      ${r.downloadsEnabled !== false ? `<button class="btn-primary-bg" onclick="downloadResource()"><i class="fa-solid fa-download"></i>Download</button>` : ''}
    </div>`;

  const isVideo = ['mp4','mov','webm'].includes(ft);
  const isAudio = ['mp3','wav','ogg'].includes(ft);
  const isImage = ['jpg','jpeg','png','svg','webp'].includes(ft);
  const isPdf = ft === 'pdf';
  const isDoc = ['doc','docx'].includes(ft);
  const isSheet = ['xls','xlsx'].includes(ft);
  const isPresentation = ['ppt','pptx'].includes(ft);
  const isArchive = ['zip','rar'].includes(ft);

  const previewBody = document.getElementById('preview-body');
  if (r.previewEnabled === false || isArchive) {
    previewBody.innerHTML = `<div style="text-align:center;padding:40px;color:#94a3b8;"><i class="fa-solid fa-file-zipper" style="font-size:48px;margin-bottom:12px;"></i><p>${isArchive?'This archive cannot be previewed.':'Preview is disabled for this resource.'}</p><p style="font-size:12px;">Click download to get the file.</p></div>`;
  } else if (isVideo) {
    previewBody.innerHTML = `<div class="video-wrapper"><video controls poster="https://images.unsplash.com/photo-1536240478700-b869070f9279?w=800&h=500&fit=crop"><source src="#" type="video/mp4"><p style="color:#fff;padding:20px;">Video preview simulated. In production, the actual video file would be served here.</p></video></div>`;
  } else if (isAudio) {
    previewBody.innerHTML = `<div class="audio-wrapper"><div class="audio-icon"><i class="fa-solid fa-headphones"></i></div><p style="font-weight:600;margin-bottom:8px;">${r.title}</p><p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">${r.duration||''}</p><audio controls style="width:100%;"><source src="#" type="audio/mpeg"></audio></div>`;
  } else if (isImage) {
    previewBody.innerHTML = `<div class="image-viewer"><img src="https://images.unsplash.com/photo-1586339949916-3e5487e5e09f?w=800&h=500&fit=crop" alt="${r.title}"><p style="font-size:12px;color:#94a3b8;margin-top:12px;">${r.title} — ${r.fileSize||''}</p></div>`;
  } else if (isPdf) {
    previewBody.innerHTML = `<div class="simulated-doc"><h2>${r.title}</h2><div style="background:#fef2f2;border-radius:8px;padding:12px;margin-bottom:16px;border-left:4px solid #ef4444;"><strong>PDF Document</strong><br><small style="color:#64748b;">${r.fileName||'document.pdf'}</small></div><p>${r.description||''}</p><p style="color:#94a3b8;font-style:italic;">This is a browser preview. Download to view the full document.</p></div>`;
  } else if (isDoc) {
    previewBody.innerHTML = `<div class="simulated-doc"><h2>${r.title}</h2><div style="background:#eff6ff;border-radius:8px;padding:12px;margin-bottom:16px;border-left:4px solid #2563eb;"><strong>Word Document</strong><br><small style="color:#64748b;">${r.fileName||'document.docx'}</small></div><p>${r.description||''}</p></div>`;
  } else if (isSheet) {
    previewBody.innerHTML = `<div class="simulated-doc"><h2>${r.title}</h2><div style="background:#f0fdf4;border-radius:8px;padding:12px;margin-bottom:16px;border-left:4px solid #16a34a;"><strong>Spreadsheet</strong><br><small style="color:#64748b;">${r.fileName||'spreadsheet.xlsx'}</small></div><p>${r.description||'Excel spreadsheet preview.'}</p></div>`;
  } else if (isPresentation) {
    previewBody.innerHTML = `<div class="simulated-doc"><h2>${r.title}</h2><div style="background:#fff7ed;border-radius:8px;padding:12px;margin-bottom:16px;border-left:4px solid #f97316;"><strong>Presentation</strong><br><small style="color:#64748b;">${r.fileName||'presentation.pptx'}</small></div><p>${r.description||''}</p></div>`;
  } else {
    previewBody.innerHTML = `<div class="simulated-doc"><h2>${r.title}</h2><div style="background:#f8fafc;border-radius:8px;padding:12px;border-left:4px solid #94a3b8;"><strong>Text</strong></div><p>${r.description||'No preview available.'}</p></div>`;
  }

  document.getElementById('resource-description').textContent = r.description || 'No description provided.';

  document.getElementById('resource-details').innerHTML = `
    <div class="info-row"><span class="lbl">Category</span><span class="val">${r.category||'N/A'}</span></div>
    <div class="info-row"><span class="lbl">File Type</span><span class="val">${ft.toUpperCase()}</span></div>
    <div class="info-row"><span class="lbl">File Size</span><span class="val">${r.fileSize||'N/A'}</span></div>
    <div class="info-row"><span class="lbl">Uploaded By</span><span class="val">${r.uploadedBy||'Admin'}</span></div>
    <div class="info-row"><span class="lbl">Upload Date</span><span class="val">${new Date(r.createdAt).toLocaleDateString()}</span></div>
    <div class="info-row"><span class="lbl">Last Updated</span><span class="val">${new Date(r.updatedAt||r.createdAt).toLocaleDateString()}</span></div>
    <div class="info-row"><span class="lbl">Version</span><span class="val">v${r.version||1}</span></div>
    <div class="info-row"><span class="lbl">Visibility</span><span class="val"><span class="share-badge" style="background:${visColors[r.visibility]||visColors.public}">${r.visibility||'public'}</span></span></div>`;

  document.getElementById('resource-stats').innerHTML = `
    <div class="info-row"><span class="lbl"><i class="fa-regular fa-eye"></i> Views</span><span class="val">${r.views||0}</span></div>
    <div class="info-row"><span class="lbl"><i class="fa-regular fa-download"></i> Downloads</span><span class="val">${r.downloads||0}</span></div>`;

  // Related resources
  const related = window.db.getAllResources().filter(rel =>
    rel.id !== r.id && rel.category === r.category && rel.visibility === 'public' && rel.status !== 'archived'
  ).slice(0, 4);
  document.getElementById('related-resources').innerHTML = related.length
    ? related.map(rel => `<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;"><a href="public-resource-view.html?id=${rel.id}" style="color:#2563eb;text-decoration:none;font-size:13px;">${rel.title}</a><br><small style="color:#94a3b8;">${rel.fileSize||''} · ${rel.downloads||0} downloads</small></div>`).join('')
    : '<p style="font-size:13px;">No related resources found.</p>';

  window.downloadResource = function() {
    window.db.logResourceDownload(id);
    const content = `=== HON-ACADEMY - Resource Download ===\r\n\r\nTitle: ${r.title}\r\nCategory: ${r.category||'N/A'}\r\nFile Type: ${ft.toUpperCase()}\r\nFile Size: ${r.fileSize||'N/A'}\r\nDescription: ${r.description||'N/A'}\r\nUpload Date: ${new Date(r.createdAt).toLocaleDateString()}\r\n\r\n--- Simulated download of "${r.title}" ---`;
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = r.fileName || `${r.title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    document.getElementById('resource-stats').innerHTML = `
      <div class="info-row"><span class="lbl"><i class="fa-regular fa-eye"></i> Views</span><span class="val">${r.views||0}</span></div>
      <div class="info-row"><span class="lbl"><i class="fa-regular fa-download"></i> Downloads</span><span class="val">${(r.downloads||0)+1}</span></div>`;
  };

  window.shareResource = function(method) {
    const url = window.location.href;
    if (method === 'copy') {
      navigator.clipboard.writeText(url).then(() => window.showToast('Link copied to clipboard!','success')).catch(() => prompt('Copy this URL:', url));
    } else if (method === 'email') {
      window.location.href = `mailto:?subject=${encodeURIComponent(r.title)}&body=${encodeURIComponent('Check out this resource: ' + url)}`;
    }
  };
})();
</script>
</body>
</html>
