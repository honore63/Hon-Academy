<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads & Resources - HON-ACADEMY</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;margin:0;padding:0;overflow-x:hidden}
/* Hero Banner */
.res-hero{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#6366f1 100%);padding:56px 24px 48px;text-align:center;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:.6}
.res-hero h1{font-family:'Poppins',sans-serif;font-size:36px;font-weight:800;color:#fff;margin-bottom:8px;position:relative}
.res-hero p{color:rgba(255,255,255,.8);font-size:16px;max-width:600px;margin:0 auto 24px;position:relative}
.res-hero .search-wrap{max-width:560px;margin:0 auto;position:relative}
.res-hero .search-wrap input{width:100%;padding:14px 20px 14px 48px;border-radius:60px;border:none;font-size:15px;background:rgba(255,255,255,.95);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.res-hero .search-wrap input:focus{outline:none;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.res-hero .search-wrap i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:16px}
/* Layout */
.res-content{max-width:1280px;margin:0 auto;padding:32px 24px}
/* Section titles */
.sec-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:#0f172a;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-title .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
/* Featured cards */
.featured-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
/* Resource card */
.res-card{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
.res-card:hover{border-color:#93c5fd;box-shadow:0 8px 25px rgba(59,130,246,.1);transform:translateY(-2px)}
.res-card.featured{border-color:#fbbf24;box-shadow:0 4px 16px rgba(251,191,36,.15)}
.res-card .card-thumb{height:140px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.res-card .card-thumb .file-type-badge{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;background:rgba(0,0,0,.6);color:#fff;backdrop-filter:blur(4px);z-index:2}
.res-card .card-thumb .icon-wrap{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.res-card .card-thumb .pin-badge{position:absolute;top:10px;left:10px;z-index:2;background:#f59e0b;color:#fff;width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px}
.res-card .card-body{padding:14px 16px 16px}
.res-card .card-body h6{font-size:14px;font-weight:700;color:#0f172a;margin:0 0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-card .card-body .desc{font-size:12px;color:#64748b;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.res-card .card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.res-card .card-meta span{font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:4px}
.res-card .card-footer{display:flex;gap:6px;padding:0 16px 14px}
.res-card .card-footer button{flex:1;padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
/* Featured strip */
.featured-strip{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;margin-bottom:32px}
.featured-strip::-webkit-scrollbar{height:4px}
.featured-strip::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.featured-strip .res-card{min-width:260px;scroll-snap-align:start}
/* Filter bar */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px;padding:16px 20px;background:#fff;border-radius:14px;border:1.5px solid #e2e8f0}
.filter-bar select,.filter-bar input{width:auto;min-width:130px;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#334155;background:#fff;font-family:'Inter',sans-serif}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:#3b82f6}
/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px}
.stat-item{background:#fff;border-radius:12px;padding:16px;text-align:center;border:1.5px solid #e2e8f0}
.stat-item .num{font-size:22px;font-weight:800;color:#1e3a8a;font-family:'Poppins',sans-serif}
.stat-item .label{font-size:12px;color:#94a3b8;font-weight:500;margin-top:2px}
/* Grid */
.resources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
@media(max-width:768px){.res-hero h1{font-size:26px}.res-hero{padding:40px 16px 32px}.res-content{padding:20px 12px}.filter-bar select,.filter-bar input{min-width:100px}}
</style>
</head>
<body>
<header class="site-header"></header>
<section class="res-hero">
<h1><i class="fa-solid fa-download me-2"></i>Downloads & Resources</h1>
<p>Access school documents, forms, publications, and learning materials. All resources are free to download.</p>
<div class="search-wrap">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" id="res-search" placeholder="Search resources by title, description, or keywords..." oninput="searchAndRender()">
</div>
</section>
<div class="res-content">
<div class="stats-row" id="stats-row"></div>
<div class="featured-strip" id="featured-strip"></div>
<div class="filter-bar">
<select id="filter-category" onchange="searchAndRender()"><option value="">All Categories</option></select>
<select id="filter-filegroup" onchange="searchAndRender()">
<option value="">All Types</option><option value="documents">Documents</option><option value="images">Images</option><option value="videos">Videos</option><option value="audio">Audio</option><option value="archives">Archives</option>
</select>
<select id="filter-filetype" onchange="searchAndRender()"><option value="">All Formats</option></select>
<select id="filter-sort" onchange="searchAndRender()">
<option value="newest">Newest</option><option value="oldest">Oldest</option><option value="downloads">Most Downloaded</option><option value="views">Most Viewed</option><option value="alpha">Alphabetical</option>
</select>
</div>
<div class="d-flex align-items-center justify-content-between mb-3">
<h5 class="sec-title" style="margin:0;"><i class="fa-solid fa-folder-open text-primary"></i>All Resources</h5>
<span id="result-count" style="font-size:13px;color:#94a3b8;"></span>
</div>
<div class="resources-grid" id="resources-grid"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-data.js"></script>
<script src="js/components.js"></script>
<script>
(function() {
  const FILE_ICONS = {pdf:'fa-file-pdf',doc:'fa-file-word',docx:'fa-file-word',xls:'fa-file-excel',xlsx:'fa-file-excel',ppt:'fa-file-powerpoint',pptx:'fa-file-powerpoint',jpg:'fa-file-image',jpeg:'fa-file-image',png:'fa-file-image',svg:'fa-file-image',webp:'fa-file-image',mp4:'fa-file-video',mov:'fa-file-video',webm:'fa-file-video',mp3:'fa-file-audio',wav:'fa-file-audio',ogg:'fa-file-audio',zip:'fa-file-zipper',rar:'fa-file-zipper',txt:'fa-file-lines'};
  const FILE_COLORS = {pdf:'#ef4444',doc:'#2563eb',docx:'#2563eb',xls:'#16a34a',xlsx:'#16a34a',ppt:'#f97316',pptx:'#f97316',jpg:'#8b5cf6',jpeg:'#8b5cf6',png:'#8b5cf6',svg:'#8b5cf6',webp:'#8b5cf6',mp4:'#ec4899',mov:'#ec4899',webm:'#ec4899',mp3:'#14b8a6',wav:'#14b8a6',ogg:'#14b8a6',zip:'#64748b',rar:'#64748b',txt:'#94a3b8'};
  const FILE_THUMB_GRADIENTS = {pdf:'linear-gradient(135deg,#fef2f2,#fee2e2)',doc:'linear-gradient(135deg,#eff6ff,#dbeafe)',xls:'linear-gradient(135deg,#f0fdf4,#dcfce7)',ppt:'linear-gradient(135deg,#fff7ed,#fed7aa)',jpg:'linear-gradient(135deg,#f5f3ff,#ede9fe)',mp4:'linear-gradient(135deg,#fdf2f8,#fce7f3)',mp3:'linear-gradient(135deg,#f0fdfa,#ccfbf1)',zip:'linear-gradient(135deg,#f8fafc,#f1f5f9)'};
  const CATEGORY_THUMB_IMAGES = {
    'Admission Forms':'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400&h=220&fit=crop',
    'School Prospectus':'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=400&h=220&fit=crop',
    'School Calendar':'https://images.unsplash.com/photo-1506784365847-bbad939e9335?w=400&h=220&fit=crop',
    'School Rules':'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=400&h=220&fit=crop',
    'Fee Structure':'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=400&h=220&fit=crop',
    'Public Notices':'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400&h=220&fit=crop',
    'Newsletters':'https://images.unsplash.com/photo-1504711434969-e33886168d6c?w=400&h=220&fit=crop',
    'School Magazine':'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=400&h=220&fit=crop',
    'Learning Resources':'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&h=220&fit=crop'
  };

  function init() {
    populateFilters();
    renderStats();
    renderFeatured();
    searchAndRender();
  }

  function populateFilters() {
    const catSel = document.getElementById('filter-category');
    const ftSel = document.getElementById('filter-filetype');
    const cats = window.db.getResourceCategories();
    cats.forEach(c => { catSel.innerHTML += `<option value="${c}">${c}</option>`; });
    const allTypes = [...new Set(Object.values(window.db.RESOURCE_FILE_TYPES).flat())];
    allTypes.sort().forEach(t => { ftSel.innerHTML += `<option value="${t}">${t.toUpperCase()}</option>`; });
  }

  function renderStats() {
    const stats = window.db.getResourceStats();
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-item"><div class="num">${stats.public}</div><div class="label">Public Resources</div></div>
      <div class="stat-item"><div class="num">${stats.totalViews}</div><div class="label">Total Views</div></div>
      <div class="stat-item"><div class="num">${stats.totalDownloads}</div><div class="label">Downloads</div></div>
      <div class="stat-item"><div class="num">${stats.categories}</div><div class="label">Categories</div></div>`;
  }

  function getThumbnail(r) {
    if (r.fileType && ['mp4','mov','webm'].includes(r.fileType)) return 'https://images.unsplash.com/photo-1536240478700-b869070f9279?w=400&h=220&fit=crop';
    if (r.fileType && ['mp3','wav','ogg'].includes(r.fileType)) return 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=220&fit=crop';
    if (r.fileType && ['zip','rar'].includes(r.fileType)) return 'https://images.unsplash.com/photo-1586282391129-76a6df230234?w=400&h=220&fit=crop';
    for (const [key, url] of Object.entries(CATEGORY_THUMB_IMAGES)) {
      if ((r.category||'').toLowerCase().includes(key.toLowerCase())) return url;
    }
    return 'https://images.unsplash.com/photo-1586339949916-3e5487e5e09f?w=400&h=220&fit=crop';
  }

  function buildCard(r, featured) {
    const ft = (r.fileType || 'txt').toLowerCase();
    const icon = FILE_ICONS[ft] || 'fa-file';
    const color = FILE_COLORS[ft] || '#94a3b8';
    const thumbBg = FILE_THUMB_GRADIENTS[ft] || 'linear-gradient(135deg,#f8fafc,#f1f5f9)';
    const thumbImg = getThumbnail(r);
    const isVideo = ['mp4','mov','webm'].includes(ft);
    const isAudio = ['mp3','wav','ogg'].includes(ft);

    return `<div class="res-card${featured?' featured':''}" onclick="window.location.href='public-resource-view.html?id=${r.id}'">
      <div class="card-thumb" style="background:${thumbBg}">
        <img src="${thumbImg}" alt="${r.title}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.3">
        ${isVideo ? '<i class="fa-solid fa-play" style="position:absolute;font-size:40px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4);z-index:2;"></i>' : ''}
        ${isAudio ? '<i class="fa-solid fa-headphones" style="position:absolute;font-size:36px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);z-index:2;"></i>' : ''}
        ${!isVideo && !isAudio ? `<div class="icon-wrap" style="background:${color}20;color:${color};position:relative;z-index:2;"><i class="fa-solid ${icon}"></i></div>` : ''}
        <span class="file-type-badge">${ft.toUpperCase()}</span>
        ${r.pinned ? '<div class="pin-badge"><i class="fa-solid fa-thumbtack"></i></div>' : ''}
        ${r.featured ? '<div class="pin-badge" style="background:#f59e0b;left:40px;"><i class="fa-solid fa-star"></i></div>' : ''}
      </div>
      <div class="card-body">
        <h6>${r.title}</h6>
        <p class="desc">${r.description || ''}</p>
        <div class="card-meta">
          <span><i class="fa-regular fa-folder"></i>${r.category||'General'}</span>
          <span><i class="fa-regular fa-clock"></i>${new Date(r.createdAt).toLocaleDateString()}</span>
          <span><i class="fa-regular fa-eye"></i>${r.views||0}</span>
          <span><i class="fa-regular fa-download"></i>${r.downloads||0}</span>
          ${r.duration ? `<span><i class="fa-regular fa-clock"></i>${r.duration}</span>` : ''}
          <span><i class="fa-regular fa-hard-drive"></i>${r.fileSize||'N/A'}</span>
        </div>
      </div>
      <div class="card-footer">
        ${(r.previewEnabled !== false && !['zip','rar'].includes(ft)) ? `<button onclick="event.stopPropagation();window.location.href='public-resource-view.html?id=${r.id}'" style="background:#eff6ff;color:#2563eb;">Preview</button>` : ''}
        ${r.downloadsEnabled !== false ? `<button onclick="event.stopPropagation();downloadResource(${r.id})" style="background:#1e3a8a;color:#fff;"><i class="fa-solid fa-download"></i>Download</button>` : ''}
      </div>
    </div>`;
  }

  function renderFeatured() {
    const featured = window.db.getFeaturedResources().filter(r => r.visibility === 'public' && r.status !== 'archived');
    const pinned = window.db.getPinnedResources().filter(r => r.visibility === 'public' && r.status !== 'archived');
    const all = [...pinned, ...featured.filter(f => !pinned.find(p => p.id === f.id))].slice(0, 8);
    const container = document.getElementById('featured-strip');
    if (!all.length) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    container.innerHTML = all.map(r => buildCard(r, true)).join('');
  }

  function searchAndRender() {
    const q = document.getElementById('res-search').value;
    const category = document.getElementById('filter-category').value;
    const fileGroup = document.getElementById('filter-filegroup').value;
    const fileType = document.getElementById('filter-filetype').value;
    const sort = document.getElementById('filter-sort').value;

    let results = window.db.searchResources(q, { category: category || undefined, fileGroup: fileGroup || undefined, fileType: fileType || undefined, sort, visibility: 'public' });
    document.getElementById('result-count').textContent = `${results.length} resource(s) found`;
    const grid = document.getElementById('resources-grid');
    if (!results.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8;"><i class="fa-solid fa-folder-open" style="font-size:48px;margin-bottom:12px;"></i><p>No resources match your search.</p></div>';
      return;
    }
    grid.innerHTML = results.map(r => buildCard(r, false)).join('');
  }

  function downloadResource(id) {
    const r = window.db.getResource(id);
    if (!r) return;
    window.db.logResourceDownload(id);
    const content = `=== HON-ACADEMY - Resource Download ===\r\n\r\nTitle: ${r.title}\r\nCategory: ${r.category||'N/A'}\r\nFile Type: ${(r.fileType||'').toUpperCase()}\r\nFile Size: ${r.fileSize||'N/A'}\r\nDescription: ${r.description||'N/A'}\r\nUpload Date: ${new Date(r.createdAt).toLocaleDateString()}\r\n\r\n--- This is a simulated download of "${r.title}" ---\r\nIn production, the actual file "${r.fileName||'resource.'+r.fileType}" would be served.`;
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = r.fileName || `${r.title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    searchAndRender(); renderStats();
  }

  window.searchAndRender = searchAndRender;
  window.downloadResource = downloadResource;
  init();
})();
</script>
<footer class="site-footer"></footer>
</body>
</html>
