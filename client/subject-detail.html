<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subject Details - HON-ACADEMY</title>
    <meta name="description" content="View lessons, books, and details for a specific subject at HON-ACADEMY." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="animate-fade-in">
    <header class="site-header"></header>

    <main class="container my-5">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
          <li class="breadcrumb-item"><a href="subjects.html" class="text-decoration-none">Subjects</a></li>
          <li class="breadcrumb-item active" id="bc-subject">Loading...</li>
        </ol>
      </nav>

      <!-- Subject Header -->
      <div class="row g-5 mb-5" id="subject-header">
        <div class="col-lg-8">
          <span class="badge bg-primary text-uppercase tracking-wider px-3 py-2 small mb-3" id="subject-level-badge">Loading</span>
          <h1 class="display-5 font-bold text-dark mb-3" id="subject-title">Loading Subject…</h1>
          <p class="text-muted lead" id="subject-desc"></p>
          <div class="d-flex flex-wrap gap-3 mt-3">
            <span class="badge bg-light text-dark border px-3 py-2" id="subject-code"><i class="fa-solid fa-hashtag me-1"></i></span>
            <span class="badge bg-light text-dark border px-3 py-2" id="subject-lesson-count"><i class="fa-solid fa-video me-1"></i></span>
            <span class="badge bg-light text-dark border px-3 py-2" id="subject-book-count"><i class="fa-solid fa-book me-1"></i></span>
          </div>
        </div>
      </div>

      <!-- Tabs: Lessons | Books -->
      <ul class="nav nav-tabs mb-4" id="subjectDetailTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active font-bold" id="lessons-tab" data-bs-toggle="tab" data-bs-target="#lessons-pane" type="button" role="tab">
            <i class="fa-solid fa-video me-2"></i>Lessons
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link font-bold" id="books-tab" data-bs-toggle="tab" data-bs-target="#books-pane" type="button" role="tab">
            <i class="fa-solid fa-book-open me-2"></i>Books & Notes
          </button>
        </li>
      </ul>

      <div class="tab-content" id="subjectDetailTabContent">
        <!-- Lessons Tab -->
        <div class="tab-pane fade show active" id="lessons-pane" role="tabpanel">
          <div class="row g-4" id="lessons-grid"></div>
          <div class="text-center py-5 d-none" id="no-lessons">
            <i class="fa-solid fa-video-slash text-muted mb-3" style="font-size: 3rem;"></i>
            <p class="text-muted">No lessons available for this subject yet.</p>
          </div>
        </div>
        <!-- Books Tab -->
        <div class="tab-pane fade" id="books-pane" role="tabpanel">
          <div class="row g-4" id="books-grid"></div>
          <div class="text-center py-5 d-none" id="no-books">
            <i class="fa-solid fa-folder-open text-muted mb-3" style="font-size: 3rem;"></i>
            <p class="text-muted">No books or notes uploaded for this subject yet.</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const subjectId = parseInt(params.get("id"));
        const subjects = window.db.getSubjects();
        const subject = subjects.find(s => s.id === subjectId);

        if (!subject) {
          document.querySelector("main").innerHTML = `
            <div class="text-center py-5">
              <i class="fa-solid fa-circle-exclamation text-danger mb-3" style="font-size: 4rem;"></i>
              <h2 class="font-bold">Subject Not Found</h2>
              <p class="text-muted">The requested subject could not be found.</p>
              <a href="subjects.html" class="btn btn-nca-blue rounded-pill px-4 mt-3">Back to Subjects</a>
            </div>`;
          return;
        }

        // Populate header
        document.title = `${subject.title} - HON-ACADEMY`;
        document.getElementById("bc-subject").textContent = subject.title;
        document.getElementById("subject-title").textContent = subject.title;
        document.getElementById("subject-desc").textContent = subject.description;
        document.getElementById("subject-level-badge").innerHTML = `<i class="fa-solid fa-graduation-cap me-1"></i> ${subject.level} Level`;
        document.getElementById("subject-level-badge").className = `badge ${subject.level === 'Primary' ? 'bg-success' : 'bg-primary'} text-uppercase tracking-wider px-3 py-2 small mb-3`;

        const lessons = window.db.getLessonsBySubject(subject.id);
        const books = window.db.getBooks().filter(b => b.subjectId === subject.id);

        document.getElementById("subject-code").innerHTML = `<i class="fa-solid fa-hashtag me-1"></i> ${subject.code}`;
        document.getElementById("subject-lesson-count").innerHTML = `<i class="fa-solid fa-video me-1"></i> ${lessons.length} Lessons`;
        document.getElementById("subject-book-count").innerHTML = `<i class="fa-solid fa-book me-1"></i> ${books.length} Books`;

        // Render Lessons
        const lessonsGrid = document.getElementById("lessons-grid");
        if (lessons.length === 0) {
          document.getElementById("no-lessons").classList.remove("d-none");
        } else {
          lessonsGrid.innerHTML = lessons.map((l, i) => `
            <div class="col-md-6 col-lg-4">
              <div class="card border-0 bg-white h-100">
                <div class="card-body p-4 d-flex flex-column">
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge bg-primary bg-opacity-10 text-primary fw-bold">Lesson ${i + 1}</span>
                    <span class="small text-muted">${l.grade}</span>
                  </div>
                  <h5 class="font-bold text-dark mb-2">${l.title}</h5>
                  <p class="small text-muted mb-3 flex-grow-1">${l.description || ''}</p>
                  <div class="small text-muted mb-3">
                    <i class="fa-solid fa-user me-1"></i> ${l.teacherName || 'HON-ACADEMY Faculty'}
                  </div>
                  <a href="lesson-viewer.html?id=${l.id}" class="btn btn-nca-blue btn-sm rounded-pill mt-auto">
                    <i class="fa-solid fa-play me-1"></i> Open Lesson
                  </a>
                </div>
              </div>
            </div>
          `).join("");
        }

        // Render Books
        const booksGrid = document.getElementById("books-grid");
        if (books.length === 0) {
          document.getElementById("no-books").classList.remove("d-none");
        } else {
          const fileIcons = { pdf: "fa-file-pdf text-danger", pptx: "fa-file-powerpoint text-warning", docx: "fa-file-word text-primary", video: "fa-file-video text-info" };
          booksGrid.innerHTML = books.map(b => {
            const icon = fileIcons[b.fileType] || "fa-file text-secondary";
            return `
              <div class="col-md-6 col-lg-4">
                <div class="card border-0 bg-white h-100">
                  <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex align-items-center gap-3 mb-3">
                      <div class="bg-light rounded-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                        <i class="fa-solid ${icon} fs-4"></i>
                      </div>
                      <span class="badge bg-light text-dark border text-uppercase" style="font-size: 9px;">${b.fileType}</span>
                    </div>
                    <h6 class="font-bold text-dark mb-2">${b.title}</h6>
                    <p class="small text-muted mb-3 flex-grow-1">Uploaded by ${b.uploadedByName}</p>
                    <button class="btn btn-outline-primary btn-sm rounded-pill mt-auto" onclick="window.showToast('Download started for ${b.title}', 'success')">
                      <i class="fa-solid fa-download me-1"></i> Download
                    </button>
                  </div>
                </div>
              </div>
            `;
          }).join("");
        }
      });
    </script>
  </body>
</html>
